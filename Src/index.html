<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWizz - Modern Weather App</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <!-- Live Clouds -->
        <div class="cloud cloud-1"><i class="fa-solid fa-cloud"></i></div>
        <div class="cloud cloud-2"><i class="fa-solid fa-cloud"></i></div>
        <div class="cloud cloud-3"><i class="fa-solid fa-cloud"></i></div>
        <div class="cloud cloud-4"><i class="fa-solid fa-cloud"></i></div>
        <div class="cloud cloud-5"><i class="fa-solid fa-cloud"></i></div>
    </div>

    <div class="container glass-panel">
        <header>
            <div class="logo">
                <i class="fa-solid fa-cloud-sun"></i>
                <h1>WeatherWizz</h1>
            </div>
            <div class="theme-toggle" id="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </div>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Search for a city...">
                <button id="search-btn" type="button" aria-label="Search weather"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="error-message" id="error-message">
                City not found. Please try again.
            </div>

            <div class="weather-content hidden" id="weather-content">
                <div class="current-weather">
                    <h2 class="city-name" id="city-name">London, UK</h2>
                    <div class="weather-main">
                        <div class="weather-icon" id="weather-icon">
                            <i class="fa-solid fa-sun icon-pulse"></i>
                        </div>
                        <div class="temp-box">
                            <h1 id="temperature">24°</h1>
                            <p class="condition" id="description">Sunny</p>
                        </div>
                    </div>
                </div>

                <div class="weather-details glass-sub-panel">
                    <div class="detail-card">
                        <i class="fa-solid fa-droplet"></i>
                        <div>
                            <p class="label">Humidity</p>
                            <p class="value" id="humidity">65%</p>
                        </div>
                    </div>

                    <div class="detail-card">
                        <i class="fa-solid fa-wind"></i>
                        <div>
                            <p class="label">Wind Speed</p>
                            <p class="value" id="wind-speed">12 km/h</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="loader hidden" id="loader">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <span class="copyright">
                © ChamodhVimukthi &nbsp; 2026 WeatherWizz, Inc.
            </span>
            <div class="footer-links">
                <a href="#"
                    onclick="event.preventDefault(); this.parentElement.innerHTML = '<span>Email: <a href=\'mailto:chamodhvimukthi@gmail.com\'>chamodhvimukthi@gmail.com</a> &nbsp;|&nbsp; GitHub: <a href=\'https://github.com/Vimukthi26\' target=\'_blank\'>Vimukthi26</a></span>';">Contact</a>
            </div>
        </div>
    </footer>

    <script src="scripts/script.js"></script>
</body>

</html>
